<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>La Corbeille de Coye</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      text-align: center;
      background: #f5e6c8;
      color: #4a2c1a;
    }

    /* 🎉 Fond confettis léger */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(#f47c20 2px, transparent 2px),
                        radial-gradient(#4caf50 2px, transparent 2px),
                        radial-gradient(#ffcc00 2px, transparent 2px);
      background-size: 50px 50px;
      opacity: 0.2;
      z-index: -1;
    }

    header {
      background: #f47c20;
      color: white;
      padding: 40px 20px;
    }

    /* 🧺 Logo */
    .logo {
      width: 100px;
      margin-bottom: 10px;
    }

    section {
      padding: 30px;
    }

    .info {
      background: white;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 500px;
    }

    a {
      color: #4caf50;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    iframe {
      width: 90%;
      height: 300px;
      border: 0;
      border-radius: 10px;
    }

    /* 📞 Bouton appeler */
    .call-button {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #4caf50;
      color: white;
      border-radius: 8px;
      font-size: 18px;
    }

    .call-button:hover {
      background: #43a047;
    }

    footer {
      background: #4a2c1a;
      color: white;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <!-- 🧺 Logo panier -->
  <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" class="logo" alt="Panier">
  
  <h1>La Corbeille de Coye</h1>
  <p>Fruits et légumes frais</p>
</header>

<section>
  <h2>Bienvenue</h2>
  <p>Des fruits et légumes sélectionnés avec passion.</p>
</section>

<section class="info">
  <h2>Informations</h2>
  <p>📍 40 Grande Rue, 60580 Coye-la-Forêt</p>
  <p>📞 03 44 58 72 63</p>

  <!-- 📞 Bouton appeler -->
  <a href="tel:0344587263" class="call-button">📞 Appeler</a>

  <p style="margin-top:20px;">
    <a href="https://www.facebook.com/la.corbeille.de.coye/photos_by" target="_blank">
      Voir notre Facebook
    </a>
  </p>
</section>

<section>
  <h2>Nous trouver</h2>
  <iframe 
    src="https://maps.google.com/maps?q=40%20Grande%20Rue%2060580%20Coye-la-Forêt&t=&z=15&ie=UTF8&iwloc=&output=embed">
  </iframe>
</section>

<footer>
  <p>© La Corbeille de Coye</p>
</footer>

</body>
</html>
